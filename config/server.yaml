server:
  host: 0.0.0.0
  http_port: 8080
  max_concurrent: 1024
  enable_metrics: true
  enable_tracing: false
model:
  repo: meta-llama/Meta-Llama-3-8B-Instruct
  path: models/Meta-Llama-3-8B-Instruct.Q4_K_M.gguf
  format: gguf
  quantization: q4_k_m
  tokenizer: sentencepiece
models:
  - id: llama3-8b
    path: models/Meta-Llama-3-8B-Instruct.Q4_K_M.gguf
    format: auto
    backend: cpu
    default: true
runtime:
  backend_priority: [cpu]
  cuda:
    enabled: false
    attention:
      kernel: auto # auto | fa3 | fa2 | standard
    flash_attention:
      enabled: false
      tile_size: 128
    phase_overlap:
      enabled: false
      min_prefill_tokens: 256
      prefill_replica: false
  backend_exposure:
    prefer_native: true
    allow_universal_fallback: true
  capability_routing:
    allow_default_fallback: true
    require_ready_backend: true
    fallback_scope: any_compatible # any_compatible | same_path_only
  scheduler:
    max_batch_size: 4
    max_batch_tokens: 8192
  tensor_parallel: 1
  mps_layers: 0
  fairness:
    enable_preemption: false
    high_priority_threshold: 5
    max_timeslice_tokens: 0
  speculative_decoding:
    enabled: false
    draft_model: ""
    max_prefill_tokens: 256
    chunk_size: 4
  nvme_offload:
    path: ""
    workers: 1
    queue_depth: 256
  paged_kv:
    cpu_pages: 4096
    eviction: lru
adapters: []
auth:
  api_keys:
    - key: dev-key-123
      scopes: [generate, read, admin]
  rate_limit_per_minute: 120
  oidc_issuer: https://issuer.example.com
  oidc_audience: inferflux
guardrails:
  blocklist:
    - secret
    - confidential
  opa_endpoint: ""
logging:
  level: info
  format: json
  audit_log: logs/audit.log
registry:
  path: ""                # Path to registry.yaml; empty = disabled (CQ-8)
  poll_interval_ms: 5000  # How often to check for file changes
