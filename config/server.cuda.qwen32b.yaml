# InferFlux CUDA Configuration for Qwen3-Coder-Tools-30B
# Optimized for RTX 4000 Ada (20GB VRAM) and similar GPUs
# Large model (30B+ params) requires reduced batch sizes and KV pages

server:
  host: 0.0.0.0
  http_port: 8080
  max_concurrent: 1024
  enable_metrics: true
  enable_tracing: false

models:
  - id: qwen3-coder-tools-30b
    path: models/qwen3-coder-tools-30b.gguf
    format: gguf                    # Rule 7: Explicit format (gguf for this model)
    backend: cuda_llama_cpp         # Uses llama.cpp CUDA backend
    default: true

runtime:
  backend_priority: [cuda, cpu]     # Rule 8: CUDA first, CPU fallback

  cuda:
    enabled: true                   # Rule 8: Enable CUDA
    attention:
      kernel: auto                  # Rule 2: auto selects FA2 on SM 8.9
    flash_attention:
      enabled: true                 # Rule 2: FA2 enabled for Ampere+ GPUs
      tile_size: 128
    phase_overlap:
      enabled: true                 # Rule 4: Enable for batch_size >= 4
      min_prefill_tokens: 256
      prefill_replica: false

  backend_exposure:
    prefer_native: true
    allow_llama_cpp_fallback: true

  capability_routing:
    allow_default_fallback: true
    require_ready_backend: true
    fallback_scope: any_compatible

  scheduler:
    max_batch_size: 16              # Rule 3: Reduced for 30B model on 20GB VRAM
    max_batch_tokens: 16384         # Larger context for coding tasks
    min_batch_size: 4               # Higher min batch for large model efficiency
    batch_accumulation_ms: 5        # Accumulate for better throughput

  tensor_parallel: 1                # Rule 6: Set to 2 for dual-GPU 30B inference

  mps_layers: 0

  fairness:
    enable_preemption: true
    high_priority_threshold: 5
    max_timeslice_tokens: 64

  speculative_decoding:
    enabled: false
    draft_model: ""
    max_prefill_tokens: 256
    chunk_size: 4

  nvme_offload:
    path: ""                        # Set to NVMe device for 30B+ if GPU memory insufficient
    workers: 1
    queue_depth: 256

  paged_kv:
    cpu_pages: 2048                 # Rule 5: Reduced for 30B model (vs 4096 for 7B)
    eviction: lru

adapters: []

auth:
  api_keys:
    - key: dev-key-123
      scopes: [generate, read, admin]
    - key: user-key-123
      scopes: [generate, read]
  rate_limit_per_minute: 120
  oidc_issuer: https://issuer.example.com
  oidc_audience: inferflux

guardrails:
  blocklist:
    - secret
    - confidential
  opa_endpoint: ""

logging:
  level: info
  format: json
  audit_log: logs/audit.log

registry:
  path: ""
  poll_interval_ms: 5000

# Performance notes for 30B models on 20GB VRAM:
# - batch_size 12-16 is optimal (vs 32-64 for 3B models)
# - cpu_pages 1536-2048 (vs 256-512 for 3B models)
# - Consider tensor_parallel: 2 for dual-GPU setups
# - FA2 enabled by default for SM 8.0+ GPUs
# - Phase overlap helps with mixed prefill/decode workloads
