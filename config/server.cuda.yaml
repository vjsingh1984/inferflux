server:
  host: 0.0.0.0
  http_port: 8080
  max_concurrent: 1024
  enable_metrics: true
  enable_tracing: false

model:
  repo: TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF
  path: models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
  format: gguf
  quantization: q4_k_m
  tokenizer: sentencepiece

models:
  - id: tinyllama
    path: models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
    format: auto
    backend: cuda
    default: true

runtime:
  backend_priority: [cuda, cpu]
  cuda:
    enabled: true
    attention:
      kernel: auto # auto | fa3 | fa2 | standard
    flash_attention:
      enabled: true
      tile_size: 128
    phase_overlap:
      enabled: true
      min_prefill_tokens: 256
      prefill_replica: false # enable on GPUs with memory headroom for dual-context overlap
  backend_exposure:
    prefer_native: true
    allow_universal_fallback: true
  capability_routing:
    allow_default_fallback: true
    require_ready_backend: true
    fallback_scope: any_compatible # any_compatible | same_path_only
  scheduler:
    max_batch_size: 32  # Increased from 8 for better GPU utilization
    max_batch_tokens: 32768  # Increased from 16384 for larger batches
    # Batch accumulation: wait for minimum batch size before processing
    # to improve GPU utilization. Optimal settings from benchmark: 5ms delay, min_batch=4
    # Result: +23.2% throughput, -16.3% p50 latency (see docs/NATIVE_BACKEND_PROFILING_ANALYSIS.md)
    min_batch_size: 4  # Minimum batch size for accumulation (override via INFERFLUX_SCHED_MIN_BATCH_SIZE)
    batch_accumulation_ms: 5  # Max wait time to accumulate batch (override via INFERFLUX_SCHED_BATCH_ACCUMULATION_MS)
  tensor_parallel: 1
  mps_layers: 0
  fairness:
    enable_preemption: true
    high_priority_threshold: 5
    max_timeslice_tokens: 64
  speculative_decoding:
    enabled: false
    draft_model: ""
    max_prefill_tokens: 256
    chunk_size: 4
  nvme_offload:
    path: ""
    workers: 1
    queue_depth: 256
  paged_kv:
    cpu_pages: 4096
    eviction: lru

adapters: []

auth:
  api_keys:
    - key: dev-key-123
      scopes: [generate, read, admin]
    - key: user-key-123
      scopes: [generate, read]
  rate_limit_per_minute: 120
  oidc_issuer: https://issuer.example.com
  oidc_audience: inferflux

guardrails:
  blocklist:
    - secret
    - confidential
  opa_endpoint: ""

logging:
  level: info
  format: json
  audit_log: logs/audit.log

registry:
  path: ""
  poll_interval_ms: 5000
