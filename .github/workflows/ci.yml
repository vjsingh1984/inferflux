name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 02:00 UTC — catches upstream dependency drift
    - cron: '0 2 * * 1'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Primary build + test job
  # Builds a CPU-only release binary, runs the full unit + stub-integration
  # suite, generates SBOM, and uploads it as a workflow artifact.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ------------------------------------------------------------------
      # System dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev \
            libyaml-cpp-dev \
            python3 \
            ccache

      # ------------------------------------------------------------------
      # ccache — reuse object files across runs; keyed on CMake + llama.cpp
      # ------------------------------------------------------------------
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-ubuntu-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'external/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            ccache-ubuntu-

      - name: Configure ccache
        run: |
          ccache --max-size=500M
          ccache --zero-stats

      # ------------------------------------------------------------------
      # CMake configure — CPU-only, no CUDA/ROCm/MPS/MTMD
      # ------------------------------------------------------------------
      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_CUDA=OFF \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=OFF \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF \
            -DENABLE_SBOM=ON

      # ------------------------------------------------------------------
      # Build all targets (inferflux_core, inferfluxd, inferctl, tests)
      # ------------------------------------------------------------------
      - name: Build
        run: cmake --build build -j$(nproc)

      # ------------------------------------------------------------------
      # Focused assertion: canonical OSS docs contract
      # Fails fast on missing canonical docs, broken local links, API/CLI
      # surface drift, or infographic-first contract violations.
      # ------------------------------------------------------------------
      - name: Assert docs contract gate
        run: python3 scripts/check_docs_contract.py

      - name: ccache stats
        run: ccache --show-stats

      # ------------------------------------------------------------------
      # Unit + stub-integration tests
      # IntegrationSSE is gated by INFERFLUX_MODEL_PATH — since that env var
      # is not set here, CMake never registers that ctest entry, so a plain
      # "ctest --test-dir build" skips it automatically.
      # ------------------------------------------------------------------
      - name: Run tests
        run: ctest --test-dir build --output-on-failure --timeout 90

      # ------------------------------------------------------------------
      # Focused assertion: inferctl model-list output modes
      # Keep these checks explicit in logs to prevent accidental regressions
      # in script-facing JSON output or default table formatting behavior.
      # ------------------------------------------------------------------
      - name: Assert inferctl model-list output modes
        run: ctest --test-dir build -R IntegrationCLIModelListContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: embeddings capability-routing contract
      # Validates default fallback policy, explicit model pinning semantics,
      # and backend-unavailable handling across unit + integration tests.
      # ------------------------------------------------------------------
      - name: Assert embeddings routing contract
        run: |
          ctest --test-dir build -R EmbeddingsRoutingTests --output-on-failure --timeout 90 -V
          ctest --test-dir build -R IntegrationEmbeddingsRoutingContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: model identity contract
      # Ensures strict explicit-ID semantics across /v1/models/{id} and
      # admin model lifecycle operations (load/unload/set-default).
      # ------------------------------------------------------------------
      - name: Assert model identity contract
        run: |
          ctest --test-dir build -R ModelIdentityTests --output-on-failure --timeout 90 -V
          ctest --test-dir build -R IntegrationModelIdentityContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: inferctl admin argument contract
      # Ensures fail-fast required values, operation exclusivity, and
      # non-2xx exit semantics for automation-facing admin commands.
      # ------------------------------------------------------------------
      - name: Assert inferctl admin argument contract
        run: |
          EXPECTED_ADMIN_ARG_METHODS=40
          ACTUAL_ADMIN_ARG_METHODS=$(sed -n '/NAME IntegrationCLIAdminArgContract/,/set_tests_properties/p' CMakeLists.txt | grep -o 'StubIntegrationTests\.[A-Za-z0-9_]*' | wc -l | tr -d ' ')
          echo "IntegrationCLIAdminArgContract method count: expected=${EXPECTED_ADMIN_ARG_METHODS} actual=${ACTUAL_ADMIN_ARG_METHODS}"
          if [ "${ACTUAL_ADMIN_ARG_METHODS}" -ne "${EXPECTED_ADMIN_ARG_METHODS}" ]; then
            echo "::error::IntegrationCLIAdminArgContract method count drifted; update EXPECTED_ADMIN_ARG_METHODS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build -R IntegrationCLIAdminArgContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: GGUF memory-contract gate
      # Ensures batch policy dequantized-cache cleanup remains explicit and
      # test count drift is surfaced for this contract suite.
      # ------------------------------------------------------------------
      - name: Assert GGUF memory contract gate
        run: |
          EXPECTED_GGUF_MEMORY_CONTRACT_TESTS=1
          ACTUAL_GGUF_MEMORY_CONTRACT_TESTS=$(./build/inferflux_tests "[memory_contract]" --list-tests 2>/dev/null | awk '/matching test case/{print $1}' | tail -n 1)
          echo "GGUFMemoryContractTests count: expected=${EXPECTED_GGUF_MEMORY_CONTRACT_TESTS} actual=${ACTUAL_GGUF_MEMORY_CONTRACT_TESTS}"
          if [ "${ACTUAL_GGUF_MEMORY_CONTRACT_TESTS}" -ne "${EXPECTED_GGUF_MEMORY_CONTRACT_TESTS}" ]; then
            echo "::error::GGUFMemoryContractTests count drifted; update EXPECTED_GGUF_MEMORY_CONTRACT_TESTS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build -R GGUFMemoryContractTests --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: throughput gate batching contract
      # Keeps run_throughput_gate.py argument + metrics parsing stable so
      # CI throughput checks remain trustworthy.
      # ------------------------------------------------------------------
      - name: Assert throughput gate batching contract
        run: |
          EXPECTED_TP_GATE_CONTRACT_TESTS=6
          ACTUAL_TP_GATE_CONTRACT_TESTS=$(grep -o 'def test_' tests/integration/throughput_gate_contract_test.py | wc -l | tr -d ' ')
          echo "ThroughputGateContractTests method count: expected=${EXPECTED_TP_GATE_CONTRACT_TESTS} actual=${ACTUAL_TP_GATE_CONTRACT_TESTS}"
          if [ "${ACTUAL_TP_GATE_CONTRACT_TESTS}" -ne "${EXPECTED_TP_GATE_CONTRACT_TESTS}" ]; then
            echo "::error::ThroughputGateContractTests method count drifted; update EXPECTED_TP_GATE_CONTRACT_TESTS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build -R ThroughputGateContractTests --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: throughput gate batching failure diagnostics
      # Ensures threshold failures keep stable, actionable stderr messages.
      # ------------------------------------------------------------------
      - name: Assert throughput gate batching failure diagnostics
        run: |
          EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS=5
          ACTUAL_TP_GATE_FAILURE_CONTRACT_TESTS=$(grep -o 'def test_' tests/integration/throughput_gate_failure_contract_test.py | wc -l | tr -d ' ')
          echo "ThroughputGateFailureContractTests method count: expected=${EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS} actual=${ACTUAL_TP_GATE_FAILURE_CONTRACT_TESTS}"
          if [ "${ACTUAL_TP_GATE_FAILURE_CONTRACT_TESTS}" -ne "${EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS}" ]; then
            echo "::error::ThroughputGateFailureContractTests method count drifted; update EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build -R ThroughputGateFailureContractTests --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # SBOM — CycloneDX 1.5 JSON + SPDX 2.3 tag-value
      # ------------------------------------------------------------------
      - name: Generate SBOM
        run: cmake --build build --target sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: build/sbom/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # macOS / Metal (MPS) build + unit test
  # Validates the Metal/MPS compilation path and unit test suite on Apple
  # Silicon.  GitHub Actions macos-latest is arm64; ENABLE_MPS=ON enables
  # llama.cpp Metal kernels and the INFERFLUX_HAS_METAL guard blocks.
  # ---------------------------------------------------------------------------
  build-check-mps:
    name: Build & Test (macos-latest, MPS)
    runs-on: macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update --quiet
          brew install cmake yaml-cpp openssl python3

      - name: Configure (MPS enabled)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CUDA=OFF \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=ON \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure --timeout 90

  build-check-mlx:
    name: Build (macos-latest, MLX flag)
    runs-on: macos-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update --quiet
          brew install cmake yaml-cpp openssl python3

      - name: Configure (ENABLE_MLX)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CUDA=OFF \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=ON \
            -DENABLE_MLX=ON \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu) --target inferfluxd inferctl

  # ---------------------------------------------------------------------------
  # CUDA compile-check (no GPU runner required)
  # Installs the CUDA toolkit so CUDAToolkit_FOUND=true in CMake, then builds
  # the full server binary with ENABLE_CUDA=ON.  This validates that CUDA-
  # guarded headers, device-context code, and llama.cpp CUDA paths compile
  # without errors — GPU test execution is deferred to self-hosted runners.
  # Non-blocking (continue-on-error) since free-tier runners have no GPU.
  # ---------------------------------------------------------------------------
  build-check-cuda:
    name: CUDA compile check (ubuntu-latest)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory only; no GPU available for execution

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libssl-dev libyaml-cpp-dev

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.3.0'
          method: 'network'

      - name: Configure (CUDA=ON)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CUDA=ON \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=OFF \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF

      # Build only the server binary; unit tests can't run without a GPU.
      - name: Build (compile-only)
        run: cmake --build build --target inferfluxd -j$(nproc)

  # ---------------------------------------------------------------------------
  # Vulkan compile-check — verifies GGML_VULKAN=ON builds clean.
  # Runs on ubuntu-latest with the official Vulkan SDK apt repository.
  # No GPU is required to compile; runtime tests are skipped (advisory).
  # ---------------------------------------------------------------------------
  build-check-vulkan:
    name: Build check (Vulkan)
    runs-on: ubuntu-latest
    continue-on-error: true   # Advisory — no Vulkan GPU in CI

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies + Vulkan SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libssl-dev libyaml-cpp-dev \
            libvulkan-dev vulkan-tools glslc

      - name: Configure (Vulkan=ON)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CUDA=OFF \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=OFF \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=ON \
            -DENABLE_MTMD=OFF \
            -DENABLE_SBOM=OFF

      # Build inferfluxd only — no GPU for tests.
      - name: Build (compile-only)
        run: cmake --build build --target inferfluxd -j$(nproc)

  # ---------------------------------------------------------------------------
  # CUDA throughput gate (self-hosted GPU)
  # Runs only when explicitly enabled via repo variable:
  #   INFERFLUX_ENABLE_CUDA_THROUGHPUT_GATE=true
  #
  # Required repo variables:
  #   INFERFLUX_CUDA_MODEL_PATH      absolute model path on runner host
  #
  # Optional tuning variables:
  #   INFERFLUX_TP_CONCURRENCY       default 8
  #   INFERFLUX_TP_REQUESTS          default 96
  #   INFERFLUX_TP_WARMUP            default 8
  #   INFERFLUX_TP_MAX_TOKENS        default 64
  #   INFERFLUX_TP_MIN_TOK_S         default 120.0
  #   INFERFLUX_TP_MIN_SUCCESS_RATE  default 1.0
  #   INFERFLUX_TP_MIN_OVERLAP_MS    default -1.0 (disabled)
  #   INFERFLUX_TP_MAX_ATTN_FALLBACKS default -1.0 (disabled)
  #   INFERFLUX_TP_MIN_BATCH_SIZE_MAX default 2.0
  #   INFERFLUX_TP_MIN_BATCH_UTILIZATION default 0.06
  #   INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIPS default -1.0 (disabled)
  #   INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIP_RATIO default -1.0 (disabled)
  #   INFERFLUX_TP_ATTN_MODE         default auto
  #   INFERFLUX_TP_EXPECT_ATTN       default "" (disabled)
  #   INFERFLUX_TP_TARGET_PREFILL_TOKENS default 4096
  # ---------------------------------------------------------------------------
  cuda-throughput-gate:
    name: CUDA throughput gate (self-hosted)
    if: ${{ vars.INFERFLUX_ENABLE_CUDA_THROUGHPUT_GATE == 'true' }}
    runs-on: [self-hosted, linux, x64, cuda]
    timeout-minutes: 45
    env:
      INFERFLUX_TP_MODEL_PATH: ${{ vars.INFERFLUX_CUDA_MODEL_PATH }}
      INFERFLUX_TP_CONCURRENCY: ${{ vars.INFERFLUX_TP_CONCURRENCY || '8' }}
      INFERFLUX_TP_REQUESTS: ${{ vars.INFERFLUX_TP_REQUESTS || '96' }}
      INFERFLUX_TP_WARMUP: ${{ vars.INFERFLUX_TP_WARMUP || '8' }}
      INFERFLUX_TP_MAX_TOKENS: ${{ vars.INFERFLUX_TP_MAX_TOKENS || '64' }}
      INFERFLUX_TP_MIN_TOK_S: ${{ vars.INFERFLUX_TP_MIN_TOK_S || '120.0' }}
      INFERFLUX_TP_MIN_SUCCESS_RATE: ${{ vars.INFERFLUX_TP_MIN_SUCCESS_RATE || '1.0' }}
      INFERFLUX_TP_MIN_OVERLAP_MS: ${{ vars.INFERFLUX_TP_MIN_OVERLAP_MS || '-1.0' }}
      INFERFLUX_TP_MAX_ATTN_FALLBACKS: ${{ vars.INFERFLUX_TP_MAX_ATTN_FALLBACKS || '-1.0' }}
      INFERFLUX_TP_MIN_BATCH_SIZE_MAX: ${{ vars.INFERFLUX_TP_MIN_BATCH_SIZE_MAX || '2.0' }}
      INFERFLUX_TP_MIN_BATCH_UTILIZATION: ${{ vars.INFERFLUX_TP_MIN_BATCH_UTILIZATION || '0.06' }}
      INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIPS: ${{ vars.INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIPS || '-1.0' }}
      INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIP_RATIO: ${{ vars.INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIP_RATIO || '-1.0' }}
      INFERFLUX_TP_ATTN_MODE: ${{ vars.INFERFLUX_TP_ATTN_MODE || 'auto' }}
      INFERFLUX_TP_EXPECT_ATTN: ${{ vars.INFERFLUX_TP_EXPECT_ATTN || '' }}
      INFERFLUX_TP_TARGET_PREFILL_TOKENS: ${{ vars.INFERFLUX_TP_TARGET_PREFILL_TOKENS || '4096' }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify toolchain
        run: |
          command -v cmake
          command -v python3

      - name: Configure (CUDA=ON)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CUDA=ON \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=OFF \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF \
            -DENABLE_SBOM=OFF

      - name: Build inferfluxd
        run: cmake --build build --target inferfluxd -j$(nproc)

      - name: Run CUDA throughput gate
        run: |
          set -euo pipefail
          if [ -z "${INFERFLUX_TP_MODEL_PATH}" ]; then
            echo "INFERFLUX_CUDA_MODEL_PATH repo variable is required for cuda-throughput-gate"
            exit 1
          fi

          declare -a EXPECT_ATTN_ARGS=()
          if [ -n "${INFERFLUX_TP_EXPECT_ATTN}" ]; then
            EXPECT_ATTN_ARGS=(--expect-cuda-attention-kernel "${INFERFLUX_TP_EXPECT_ATTN}")
          fi

          ./scripts/run_throughput_gate.py \
            --server-bin ./build/inferfluxd \
            --config config/server.cuda.yaml \
            --host 127.0.0.1 \
            --port 18081 \
            --endpoint /v1/completions \
            --model tinyllama \
            --backend cuda \
            --concurrency "${INFERFLUX_TP_CONCURRENCY}" \
            --requests "${INFERFLUX_TP_REQUESTS}" \
            --warmup-requests "${INFERFLUX_TP_WARMUP}" \
            --max-tokens "${INFERFLUX_TP_MAX_TOKENS}" \
            --mixed-prompt-workload \
            --target-total-prefill-tokens "${INFERFLUX_TP_TARGET_PREFILL_TOKENS}" \
            --min-completion-tok-per-sec "${INFERFLUX_TP_MIN_TOK_S}" \
            --min-success-rate "${INFERFLUX_TP_MIN_SUCCESS_RATE}" \
            --require-metrics \
            --require-cuda-lanes \
            --require-cuda-overlap \
            --min-cuda-overlap-duration-ms "${INFERFLUX_TP_MIN_OVERLAP_MS}" \
            --max-cuda-attention-fallbacks "${INFERFLUX_TP_MAX_ATTN_FALLBACKS}" \
            --min-batch-size-max "${INFERFLUX_TP_MIN_BATCH_SIZE_MAX}" \
            --min-batch-size-utilization "${INFERFLUX_TP_MIN_BATCH_UTILIZATION}" \
            --max-batch-token-budget-skips "${INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIPS}" \
            --max-batch-token-budget-skip-ratio "${INFERFLUX_TP_MAX_BATCH_TOKEN_BUDGET_SKIP_RATIO}" \
            --server-log-path build/throughput_gate_server.log \
            --server-env "INFERFLUX_CUDA_ATTENTION_KERNEL=${INFERFLUX_TP_ATTN_MODE}" \
            --server-env "INFERFLUX_MODELS=id=tinyllama,path=${INFERFLUX_TP_MODEL_PATH},backend=cuda,default=true" \
            "${EXPECT_ATTN_ARGS[@]}"

      - name: Upload throughput gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cuda-throughput-gate-logs-${{ github.sha }}
          path: build/throughput_gate_server.log
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Coverage — gcov/lcov instrumented Debug build, Codecov upload.
  # Runs unit + stub-integration test suite; uploads lcov.info to Codecov.
  # A 50 % line-coverage floor is enforced via .codecov.yml; missing tokens
  # in the Codecov secret make the upload a no-op (advisory only).
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            libssl-dev \
            libyaml-cpp-dev \
            python3 \
            lcov

      # ------------------------------------------------------------------
      # Configure with coverage instrumentation
      # ENABLE_SBOM=OFF keeps the build focused on tests.
      # ------------------------------------------------------------------
      - name: Configure (coverage)
        run: |
          cmake -S . -B build-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_COVERAGE=ON \
            -DENABLE_CUDA=OFF \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=OFF \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF \
            -DENABLE_SBOM=OFF

      - name: Build
        run: cmake --build build-cov -j$(nproc)

      # ------------------------------------------------------------------
      # Focused assertion: canonical OSS docs contract
      # Fails fast on missing canonical docs, broken local links, API/CLI
      # surface drift, or infographic-first contract violations.
      # ------------------------------------------------------------------
      - name: Assert docs contract gate
        run: python3 scripts/check_docs_contract.py

      # ------------------------------------------------------------------
      # Focused assertion: inferctl model-list output modes
      # Keep these checks explicit in logs to prevent accidental regressions
      # in script-facing JSON output or default table formatting behavior.
      # ------------------------------------------------------------------
      - name: Assert inferctl model-list output modes
        run: ctest --test-dir build-cov -R IntegrationCLIModelListContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: embeddings capability-routing contract
      # ------------------------------------------------------------------
      - name: Assert embeddings routing contract
        run: |
          ctest --test-dir build-cov -R EmbeddingsRoutingTests --output-on-failure --timeout 90 -V
          ctest --test-dir build-cov -R IntegrationEmbeddingsRoutingContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: model identity contract
      # ------------------------------------------------------------------
      - name: Assert model identity contract
        run: |
          ctest --test-dir build-cov -R ModelIdentityTests --output-on-failure --timeout 90 -V
          ctest --test-dir build-cov -R IntegrationModelIdentityContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: inferctl admin argument contract
      # ------------------------------------------------------------------
      - name: Assert inferctl admin argument contract
        run: |
          EXPECTED_ADMIN_ARG_METHODS=40
          ACTUAL_ADMIN_ARG_METHODS=$(sed -n '/NAME IntegrationCLIAdminArgContract/,/set_tests_properties/p' CMakeLists.txt | grep -o 'StubIntegrationTests\.[A-Za-z0-9_]*' | wc -l | tr -d ' ')
          echo "IntegrationCLIAdminArgContract method count: expected=${EXPECTED_ADMIN_ARG_METHODS} actual=${ACTUAL_ADMIN_ARG_METHODS}"
          if [ "${ACTUAL_ADMIN_ARG_METHODS}" -ne "${EXPECTED_ADMIN_ARG_METHODS}" ]; then
            echo "::error::IntegrationCLIAdminArgContract method count drifted; update EXPECTED_ADMIN_ARG_METHODS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build-cov -R IntegrationCLIAdminArgContract --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: GGUF memory-contract gate
      # Ensures batch policy dequantized-cache cleanup remains explicit and
      # test count drift is surfaced for this contract suite.
      # ------------------------------------------------------------------
      - name: Assert GGUF memory contract gate
        run: |
          EXPECTED_GGUF_MEMORY_CONTRACT_TESTS=1
          ACTUAL_GGUF_MEMORY_CONTRACT_TESTS=$(./build-cov/inferflux_tests "[memory_contract]" --list-tests 2>/dev/null | awk '/matching test case/{print $1}' | tail -n 1)
          echo "GGUFMemoryContractTests count: expected=${EXPECTED_GGUF_MEMORY_CONTRACT_TESTS} actual=${ACTUAL_GGUF_MEMORY_CONTRACT_TESTS}"
          if [ "${ACTUAL_GGUF_MEMORY_CONTRACT_TESTS}" -ne "${EXPECTED_GGUF_MEMORY_CONTRACT_TESTS}" ]; then
            echo "::error::GGUFMemoryContractTests count drifted; update EXPECTED_GGUF_MEMORY_CONTRACT_TESTS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build-cov -R GGUFMemoryContractTests --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: throughput gate batching contract
      # ------------------------------------------------------------------
      - name: Assert throughput gate batching contract
        run: |
          EXPECTED_TP_GATE_CONTRACT_TESTS=6
          ACTUAL_TP_GATE_CONTRACT_TESTS=$(grep -o 'def test_' tests/integration/throughput_gate_contract_test.py | wc -l | tr -d ' ')
          echo "ThroughputGateContractTests method count: expected=${EXPECTED_TP_GATE_CONTRACT_TESTS} actual=${ACTUAL_TP_GATE_CONTRACT_TESTS}"
          if [ "${ACTUAL_TP_GATE_CONTRACT_TESTS}" -ne "${EXPECTED_TP_GATE_CONTRACT_TESTS}" ]; then
            echo "::error::ThroughputGateContractTests method count drifted; update EXPECTED_TP_GATE_CONTRACT_TESTS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build-cov -R ThroughputGateContractTests --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Focused assertion: throughput gate batching failure diagnostics
      # ------------------------------------------------------------------
      - name: Assert throughput gate batching failure diagnostics
        run: |
          EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS=5
          ACTUAL_TP_GATE_FAILURE_CONTRACT_TESTS=$(grep -o 'def test_' tests/integration/throughput_gate_failure_contract_test.py | wc -l | tr -d ' ')
          echo "ThroughputGateFailureContractTests method count: expected=${EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS} actual=${ACTUAL_TP_GATE_FAILURE_CONTRACT_TESTS}"
          if [ "${ACTUAL_TP_GATE_FAILURE_CONTRACT_TESTS}" -ne "${EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS}" ]; then
            echo "::error::ThroughputGateFailureContractTests method count drifted; update EXPECTED_TP_GATE_FAILURE_CONTRACT_TESTS in .github/workflows/ci.yml"
            exit 1
          fi
          ctest --test-dir build-cov -R ThroughputGateFailureContractTests --output-on-failure --timeout 90 -V

      # ------------------------------------------------------------------
      # Run tests + collect coverage in one CMake target
      # ------------------------------------------------------------------
      - name: Generate coverage report
        run: cmake --build build-cov --target coverage

      # ------------------------------------------------------------------
      # Upload to Codecov — requires CODECOV_TOKEN repository secret.
      # The action is a no-op if the token is absent (advisory mode).
      # ------------------------------------------------------------------
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build-cov/coverage/lcov.info
          flags: unittests
          name: inferflux-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ github.sha }}
          path: build-cov/coverage/html/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # GGUF quantization tests (CPU-only)
  # Runs GGUF parsing and quantization handler tests on standard runners.
  # GPU-dependent tests are automatically skipped via #ifdef INFERFLUX_HAS_CUDA.
  # ---------------------------------------------------------------------------
  gguf-quantization-tests:
    name: GGUF & Quantization Tests (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libssl-dev \
            libyaml-cpp-dev \
            python3 \
            ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-ubuntu-gguf-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'external/llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            ccache-ubuntu-gguf-
            ccache-ubuntu-

      - name: Configure ccache
        run: |
          ccache --max-size=500M
          ccache --zero-stats

      # CPU-only build: GPU tests will be skipped via #ifdef INFERFLUX_HAS_CUDA
      - name: Configure (CPU-only)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_CUDA=OFF \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=OFF \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF \
            -DENABLE_SBOM=OFF

      - name: Build tests
        run: cmake --build build --target inferflux_tests -j$(nproc)

      - name: ccache stats
        run: ccache --show-stats

      # Run GGUF tests (CPU-only, GPU tests automatically skipped)
      - name: Run GGUF tests
        run: |
          echo "=== Running GGUF tests (CPU-only) ==="
          ctest --test-dir build -R gguf --output-on-failure --timeout 90 -V

      # Run quantization tests (CPU-only, GPU tests automatically skipped)
      - name: Run quantization tests
        run: |
          echo "=== Running quantization tests (CPU-only) ==="
          ctest --test-dir build -R quantization --output-on-failure --timeout 90 -V

      # Verify test count expectations
      - name: Assert GGUF test count
        run: |
          echo "=== Verifying GGUF test count ==="
          # Test count should be at least 55 (as of 2026-03-05)
          MIN_GGUF_TESTS=55
          ACTUAL_GGUF_TESTS=$(./build/inferflux_tests "[gguf]" --list-tests 2>/dev/null | wc -l)
          echo "GGUF test count: minimum=${MIN_GGUF_TESTS} actual=${ACTUAL_GGUF_TESTS}"
          if [ "${ACTUAL_GGUF_TESTS}" -lt "${MIN_GGUF_TESTS}" ]; then
            echo "::error::GGUF test count below minimum; update MIN_GGUF_TESTS in .github/workflows/ci.yml"
            exit 1
          fi

      - name: Assert quantization test count
        run: |
          echo "=== Verifying quantization test count ==="
          # Test count should be at least 8 (as of 2026-03-05)
          MIN_QUANT_TESTS=8
          ACTUAL_QUANT_TESTS=$(./build/inferflux_tests "[quantization]" --list-tests 2>/dev/null | wc -l)
          echo "Quantization test count: minimum=${MIN_QUANT_TESTS} actual=${ACTUAL_QUANT_TESTS}"
          if [ "${ACTUAL_QUANT_TESTS}" -lt "${MIN_QUANT_TESTS}" ]; then
            echo "::error::Quantization test count below minimum; update MIN_QUANT_TESTS in .github/workflows/ci.yml"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # GGUF quantization tests (self-hosted CUDA)
  # Runs full GGUF and quantization test suite on self-hosted GPU runners.
  # Tests both CPU and GPU code paths.
  # Only runs when explicitly enabled via repo variable.
  # ---------------------------------------------------------------------------
  gguf-quantization-tests-cuda:
    name: GGUF & Quantization Tests (self-hosted CUDA)
    if: ${{ vars.INFERFLUX_ENABLE_CUDA_GGUF_TESTS == 'true' }}
    runs-on: [self-hosted, linux, x64, cuda]
    timeout-minutes: 30

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify toolchain
        run: |
          command -v cmake
          command -v python3
          command -v nvcc

      # CUDA build: INFERFLUX_HAS_CUDA will be defined
      - name: Configure (CUDA=ON)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CUDA=ON \
            -DENABLE_ROCM=OFF \
            -DENABLE_MPS=OFF \
            -DENABLE_BLAS=OFF \
            -DENABLE_VULKAN=OFF \
            -DENABLE_MTMD=OFF \
            -DENABLE_SBOM=OFF

      - name: Build tests
        run: cmake --build build --target inferflux_tests -j$(nproc)

      # Run GGUF tests (includes GPU tests)
      - name: Run GGUF tests (CUDA)
        run: |
          echo "=== Running GGUF tests (with CUDA) ==="
          ctest --test-dir build -R gguf --output-on-failure --timeout 90 -V

      # Run quantization tests (includes GPU tests)
      - name: Run quantization tests (CUDA)
        run: |
          echo "=== Running quantization tests (with CUDA) ==="
          ctest --test-dir build -R quantization --output-on-failure --timeout 90 -V

      - name: Verify CUDA tests ran
        run: |
          echo "=== Verifying CUDA test execution ==="
          # Check that GPU tests were compiled and executed
          if ! ./build/inferflux_tests --list-tests | grep -q "\[gpu\]"; then
            echo "::warning::No GPU tests found in test suite"
          else
            GPU_TEST_COUNT=$(./build/inferflux_tests --list-tests | grep "\[gpu\]" | wc -l)
            echo "GPU tests available: ${GPU_TEST_COUNT}"
          fi

  # ---------------------------------------------------------------------------
  # clang-format style gate
  # Reports violations as annotations but does not block merge by default.
  # Change `continue-on-error: true` → `false` to enforce formatting in CI.
  # ---------------------------------------------------------------------------
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          find server runtime scheduler model cli net io policy \
            \( -name '*.cpp' -o -name '*.h' \) \
            ! -path '*/external/*' \
            | sort \
            | xargs clang-format --dry-run --Werror
